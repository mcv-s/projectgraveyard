<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Graveyard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <button id="shareButton" class="share-button" title="Share / Save graveyard">
        🔗
    </button>
    
    <button id="centerButton" class="center-button" title="Center view on objects">
        ⛶
    </button>
    
    <button id="textButton" class="tool-button" title="Add text">
        T
    </button>
    
    <button id="lineButton" class="tool-button" title="Add line">
        /
    </button>
    
    <button id="squareButton" class="tool-button" title="Add square">
        □
    </button>
    
    <button id="plusButton" class="plus-button">+</button>
    
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebarTitle">Project Details</h2>
            <button id="closeButton" class="close-button">&times;</button>
        </div>
        <div class="sidebar-content">
            <!-- Grave Object Section -->
            <div id="graveSection" class="object-section" style="display: none;">
                <div class="form-group">
                    <label for="graveName">Project Name:</label>
                    <input type="text" id="graveName" placeholder="Enter project name">
                </div>
                <div class="form-group">
                    <label for="graveDescription">Description:</label>
                    <textarea id="graveDescription" placeholder="Enter description"></textarea>
                </div>
                <div class="form-group">
                    <label for="graveEmoji">Icon:</label>
                    <input type="text" id="graveEmoji" placeholder="enter icon character here">
                </div>
                <button id="deleteGraveButton" class="delete-button">Delete</button>
            </div>
            
            <!-- Text Object Section -->
            <div id="textSection" class="object-section" style="display: none;">
                <div class="form-group">
                    <label for="textContent">Text Content:</label>
                    <textarea id="textContent" placeholder="Enter text (supports newlines)" style="font-family: monospace;"></textarea>
                </div>
                <div class="form-group">
                    <label for="textSize">Text Size:</label>
                    <input type="number" id="textSize" min="10" max="100" placeholder="Font size">
                </div>
                <button id="deleteTextButton" class="delete-button">Delete</button>
            </div>
            
            <!-- Line Object Section -->
            <div id="lineSection" class="object-section" style="display: none;">
                <p style="color: #999; margin-bottom: 1rem;">Line Object</p>
                <button id="deleteLineButton" class="delete-button">Delete</button>
            </div>
            
            <!-- Square Object Section -->
            <div id="squareSection" class="object-section" style="display: none;">
                <p style="color: #999; margin-bottom: 1rem;">Square Object</p>
                <button id="deleteSquareButton" class="delete-button">Delete</button>
            </div>
        </div>
    </div>
    
    <script src="code.js"></script>
</body>
</html>
